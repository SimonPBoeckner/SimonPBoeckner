name: Update Drama List SVG

on:
  schedule:
    - cron: "0 6 * * *"   # runs daily at 6am UTC
  push:
    branches: [main]
  workflow_dispatch:       # lets you trigger it manually from GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate SVG
        run: node generate-dramalist.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dramalist.svg
          git diff --cached --quiet || git commit -m "chore: update drama list SVG"
          git push